<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sounds of the West Wing</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #58a6ff; /* GitHub Blue vibe to match your theme */
            --text-main: #adbac7;
            --text-white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h1 { color: var(--text-white); font-size: 1.4rem; margin-bottom: 4px; }
        p.subtitle { color: #768390; margin-bottom: 30px; font-size: 0.9rem; letter-spacing: 0.5px; }

        .playlist { list-style: none; padding: 0; }

        .track-item {
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .track-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .track-info { margin-left: 12px; }
        .track-name { color: var(--text-white); font-weight: 600; display: block; font-size: 1rem; }
        .track-artist { color: #768390; font-size: 0.85rem; }

        .cover-art {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2d333b, #444c56);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        audio {
            width: 100%;
            height: 32px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2); /* Sleek dark player */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sounds of the West Wing</h1>
    <p class="subtitle">Office Whiteboard Collection</p>

    <div class="playlist">
        
        <div class="track-item">
            <div class="track-header">
                <div class="cover-art">🎹</div>
                <div class="track-info">
                    <span class="track-name">First Recommendation</span>
                    <span class="track-artist">Added by [Name]</span>
                </div>
            </div>
            <audio controls src="02 - Free.m4a"></audio>
        </div>

        <div class="track-item">
            <div class="track-header">
                <div class="cover-art">🎷</div>
                <div class="track-info">
                    <span class="track-name">Second Recommendation</span>
                    <span class="track-artist">Added by [Name]</span>
                </div>
            </div>
            <audio controls src="audio/your-file-2.mp3"></audio>
        </div>

    </div>
</div>

</body>
</html>
